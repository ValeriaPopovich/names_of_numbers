<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Числовой диктор</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;600;700&display=swap');
*{box-sizing:border-box;font-family:Comfortaa,sans-serif}
body{
margin:0;padding:20px;min-height:100vh;color:#40363a;
background:
radial-gradient(circle at 8% 12%, #ffd9c8 0 70px, transparent 71px),
radial-gradient(circle at 92% 18%, #ffe6b8 0 60px, transparent 61px),
radial-gradient(circle at 85% 85%, #ffd8e0 0 90px, transparent 91px),
radial-gradient(circle at 12% 80%, #ffe8cf 0 55px, transparent 56px),
linear-gradient(135deg,#fff9f4,#ffece2);
}
.app{max-width:900px;margin:auto}
.header{text-align:center;margin-bottom:25px}
h1{font-size:clamp(34px,6vw,56px);color:#ff7654;margin:0}
.subtitle{color:#888;margin-top:10px}
.card{
background:#fff;border-radius:35px;padding:35px;
box-shadow:0 20px 50px rgba(80,40,20,.12)
}
.top{display:flex;justify-content:space-between;gap:10px}
.badge{
background:#fff1e8;color:#ff7654;padding:10px 18px;border-radius:30px;font-weight:700
}
.progress{height:10px;background:#f2e7df;border-radius:20px;margin:25px 0;overflow:hidden}
.progress div{height:100%;background:#ff7654}
.number{text-align:center;font-size:clamp(45px,10vw,90px);font-weight:700;margin:30px}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:15px}
button{
border-radius:22px;padding:16px;border:2px solid #f2dfd5;
background:#fff8f3;font-size:17px;font-weight:700;cursor:pointer
}
button:hover{transform:translateY(-2px)}
button:disabled{cursor:default}
.correct{background:#e8f8ee!important;border-color:#68c38c!important}
.wrong{background:#fff0f0!important;border-color:#ef9299!important}
.next,.subscribe a{
display:inline-block;
margin-top:14px;
background:#f2a65a;
color:#fff;
padding:10px 22px;
width:auto;
border-radius:25px;
font-size:14px;
text-align:center;
text-decoration:none
}
.subscribe{
margin-top:30px;background:#fff3eb;border-radius:25px;padding:25px;text-align:center;font-weight:700
}
.subscribe a{
padding:10px 22px;
border-radius:25px
}
.result{text-align:center}
@media(max-width:650px){.answers{grid-template-columns:1fr}.card{padding:20px}}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>Числовой диктор</h1>
<div class="subtitle">Учимся правильно читать и называть числа</div>
</div>
<div class="card" id="card">
<div class="top">
<div class="badge">Раунд <span id="round">1</span>/12</div>
<div class="badge">⭐ <span id="score">0</span>/120</div>
</div>
<div class="progress"><div id="bar"></div></div>
<div class="number" id="number"></div>
<div class="answers" id="answers"></div>
<button class="next" id="next">Следующее число →</button>
<div class="subscribe">
🎓 Больше интерактивных заданий по математике
<a href="https://t.me/lera_easy_math" target="_blank">Подписаться на канал автора</a>
</div>
</div>
</div>
<script>
let round = 1;
let score = 0;
let answered = false;
let correct = "";

const ones = ["","один","два","три","четыре","пять","шесть","семь","восемь","девять"];
const onesFeminine = ["","одна","две","три","четыре","пять","шесть","семь","восемь","девять"];
const teens = ["десять","одиннадцать","двенадцать","тринадцать","четырнадцать","пятнадцать","шестнадцать","семнадцать","восемнадцать","девятнадцать"];
const tens = ["","","двадцать","тридцать","сорок","пятьдесят","шестьдесят","семьдесят","восемьдесят","девяносто"];
const huns = ["","сто","двести","триста","четыреста","пятьсот","шестьсот","семьсот","восемьсот","девятьсот"];

const card = document.getElementById("card");
const roundEl = document.getElementById("round");
const scoreEl = document.getElementById("score");
const bar = document.getElementById("bar");
const numberEl = document.getElementById("number");
const answers = document.getElementById("answers");
const next = document.getElementById("next");

function triad(n, feminine = false) {
  const result = [];
  const hundreds = Math.floor(n / 100);
  const rest = n % 100;

  if (hundreds) result.push(huns[hundreds]);

  if (rest >= 10 && rest <= 19) {
    result.push(teens[rest - 10]);
  } else {
    const ten = Math.floor(rest / 10);
    const one = rest % 10;

    if (ten) result.push(tens[ten]);
    if (one) result.push((feminine ? onesFeminine : ones)[one]);
  }

  return result.join(" ");
}

function wordForm(n, one, few, many) {
  const lastTwo = n % 100;
  const last = n % 10;

  if (lastTwo >= 11 && lastTwo <= 19) return many;
  if (last === 1) return one;
  if (last >= 2 && last <= 4) return few;
  return many;
}

function words(n) {
  if (n === 0) return "ноль";

  const result = [];
  const millions = Math.floor(n / 1_000_000);
  const thousands = Math.floor(n / 1_000) % 1_000;
  const units = n % 1_000;

  if (millions) {
    result.push(triad(millions));
    result.push(wordForm(millions, "миллион", "миллиона", "миллионов"));
  }

  if (thousands) {
    result.push(triad(thousands, true));
    result.push(wordForm(thousands, "тысяча", "тысячи", "тысяч"));
  }

  if (units) result.push(triad(units));

  return result.join(" ").replace(/\s+/g, " ").trim();
}

function getRange(currentRound) {
  if (currentRound <= 3) return { min: 100, max: 999 };
  if (currentRound <= 7) return { min: 1_000, max: 999_999 };
  return { min: 1_000_000, max: 999_999_999 };
}

function randomInteger(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generate() {
  answered = false;

  const { min, max } = getRange(round);
  const n = randomInteger(min, max);

  correct = words(n);
  numberEl.textContent = n.toLocaleString("ru-RU");
  roundEl.textContent = round;
  scoreEl.textContent = score;
  bar.style.width = ((round - 1) / 12 * 100) + "%";

  const options = new Set([correct]);

  while (options.size < 4) {
    const distractorNumber = randomInteger(min, max);
    options.add(words(distractorNumber));
  }

  const shuffledOptions = [...options].sort(() => Math.random() - 0.5);
  answers.innerHTML = "";

  shuffledOptions.forEach(text => {
    const button = document.createElement("button");
    button.textContent = text;

    button.onclick = () => {
      if (answered) return;
      answered = true;

      document.querySelectorAll(".answers button").forEach(item => {
        item.disabled = true;
      });

      if (text === correct) {
        button.classList.add("correct");
        score += 10;
      } else {
        button.classList.add("wrong");
        [...answers.children]
          .find(item => item.textContent === correct)
          ?.classList.add("correct");
      }

      scoreEl.textContent = score;
    };

    answers.appendChild(button);
  });
}

next.onclick = () => {
  if (round < 12) {
    round++;
    generate();
    return;
  }

  card.innerHTML = `
    <div class="result">
      <h2>🏆 Игра окончена</h2>
      <h3>${score} из 120 баллов</h3>
      <button class="next" id="restart">Сыграть ещё раз</button>
      <div class="subscribe">
        🎓 Больше интерактивных заданий по математике
        <a href="https://t.me/lera_easy_math" target="_blank">Подписаться на канал автора</a>
      </div>
    </div>
  `;

  document.getElementById("restart").onclick = () => location.reload();
};

generate();
</script>
</body>
</html>
