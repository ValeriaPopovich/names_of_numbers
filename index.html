<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Числовой диктор</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;600;700&display=swap');

*{
 box-sizing:border-box;
 font-family:'Comfortaa',sans-serif;
}

body{
 margin:0;
 min-height:100vh;
 padding:16px;
 background:
 radial-gradient(circle at 15% 10%,#ffe0d2 0,transparent 20%),
 radial-gradient(circle at 85% 15%,#ffe8b8 0,transparent 18%),
 linear-gradient(135deg,#fffaf6,#fff0e8);
 color:#38343b;
}

.container{
 max-width:900px;
 margin:auto;
}

.header{
 text-align:center;
 margin-bottom:20px;
}

h1{
 font-size:clamp(32px,6vw,55px);
 margin:0;
 color:#ff7654;
}

.subtitle{
 margin-top:8px;
 color:#777;
}

.card{
 background:white;
 border-radius:32px;
 padding:clamp(18px,4vw,40px);
 box-shadow:0 20px 50px rgba(80,50,30,.12);
}

.info{
 display:flex;
 justify-content:space-between;
 gap:10px;
 flex-wrap:wrap;
}

.badge{
 background:#fff1e8;
 color:#ff7654;
 padding:10px 16px;
 border-radius:30px;
 font-weight:700;
}

.progress{
 height:10px;
 background:#f1e8e1;
 border-radius:20px;
 margin:25px 0;
 overflow:hidden;
}

.progress div{
 height:100%;
 width:0;
 background:#ff7654;
 transition:.3s;
}

.number{
 text-align:center;
 font-size:clamp(45px,10vw,90px);
 font-weight:700;
 margin:25px 0;
}

.answers{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
}

button{
 cursor:pointer;
 border:none;
 border-radius:20px;
 padding:16px;
 font-size:17px;
 font-weight:700;
 transition:.2s;
}

.answer{
 background:#fff8f4;
 border:2px solid #f3e3da;
 min-height:70px;
}

.answer:hover{
 transform:translateY(-3px);
 border-color:#ffb39a;
}

.correct{
 background:#e8f8ee!important;
 border-color:#63bf8b!important;
}

.wrong{
 background:#fff0f0!important;
 border-color:#ed9299!important;
}

.primary{
 margin-top:20px;
 width:100%;
 background:#ff7654;
 color:white;
}

.subscribe{
 margin-top:30px;
 text-align:center;
 background:#fff4ec;
 padding:22px;
 border-radius:25px;
}

.subscribe a{
 display:inline-block;
 margin-top:12px;
 background:#ff7654;
 color:white;
 padding:14px 28px;
 border-radius:30px;
 text-decoration:none;
 font-weight:700;
}

@media(max-width:650px){
 .answers{
  grid-template-columns:1fr;
 }
}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h1>Числовой диктор</h1>
<div class="subtitle">Учимся правильно читать и называть числа</div>
</div>

<div class="card">

<div class="info">
<div class="badge">Раунд <span id="round">1</span>/12</div>
<div class="badge">⭐ <span id="score">0</span> / 120</div>
</div>

<div class="progress">
<div id="bar"></div>
</div>

<div class="number" id="number"></div>

<div class="answers" id="answers"></div>

<button class="primary" id="next">Следующее число →</button>

<div class="subscribe">
<div>🎓 Больше интерактивных заданий по математике</div>
<a href="https://t.me/lera_easy_math" target="_blank">
Подписаться на канал автора
</a>
</div>

</div>
</div>

<script>
const words={
ones:["","один","два","три","четыре","пять","шесть","семь","восемь","девять"],
tens:["","","двадцать","тридцать","сорок","пятьдесят","шестьдесят","семьдесят","восемьдесят","девяносто"],
hundreds:["","сто","двести","триста","четыреста","пятьсот","шестьсот","семьсот","восемьсот","девятьсот"]
};

function toWords(n){
 if(n<10)return words.ones[n];
 if(n<100){
  return words.tens[Math.floor(n/10)]+" "+(n%10?words.ones[n%10]:"");
 }
 if(n<1000){
  return words.hundreds[Math.floor(n/100)]+" "+toWords(n%100);
 }
 return n.toString();
}

let round=1;
let score=0;
let correct="";

function generate(){
 let n=Math.floor(Math.random()*900)+100;
 correct=toWords(n).replace(/\s+/g," ").trim();

 document.getElementById("number").textContent=n.toLocaleString("ru-RU");
 document.getElementById("round").textContent=round;
 document.getElementById("score").textContent=score;
 document.getElementById("bar").style.width=((round-1)/12*100)+"%";

 let arr=[correct];
 while(arr.length<4){
  let fake=toWords(Math.floor(Math.random()*900)+100).replace(/\s+/g," ").trim();
  if(!arr.includes(fake))arr.push(fake);
 }
 arr.sort(()=>Math.random()-.5);

 const box=document.getElementById("answers");
 box.innerHTML="";

 arr.forEach(x=>{
  let b=document.createElement("button");
  b.className="answer";
  b.textContent=x;
  b.onclick=()=>{
   document.querySelectorAll(".answer").forEach(el=>el.disabled=true);
   if(x===correct){
    b.classList.add("correct");
    score+=10;
   }else{
    b.classList.add("wrong");
    [...document.querySelectorAll(".answer")].find(el=>el.textContent===correct)?.classList.add("correct");
   }
   document.getElementById("score").textContent=score;
  };
  box.appendChild(b);
 });
}


document.getElementById("next").onclick=()=>{
 if(round<12){
  round++;
  generate();
 } else {
  document.querySelector(".card").innerHTML = `
    <div style="text-align:center;padding:30px">
      <div style="font-size:70px">🏆</div>
      <h2 style="color:#ff7654;font-size:36px">Игра окончена!</h2>
      <p style="font-size:20px">Твой результат: <b>${score}</b> из <b>120</b> баллов</p>
      <button class="primary" onclick="location.reload()">Сыграть ещё раз</button>
    </div>
  `;
 }
};

generate();
</script>

</body>
</html>
