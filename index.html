<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Числовой диктор</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&family=Nunito:wght@600;700;800;900&display=swap');

*{box-sizing:border-box; font-family:"Comfortaa",sans-serif;}
body{
 margin:0;
 min-height:100vh;
 padding:20px;
 font-family:"Comfortaa",sans-serif;
 color:#35313a;
 background:
 radial-gradient(circle at 10% 10%,#ffdcca 0 8%,transparent 9%),
 radial-gradient(circle at 90% 15%,#ffe8b8 0 8%,transparent 9%),
 linear-gradient(135deg,#fffaf6,#fff1e8);
}
.wrapper{max-width:1000px;margin:auto}
.header{text-align:center;margin-bottom:25px}
h1{
 font-family:"Comfortaa",sans-serif;
 font-size:clamp(34px,5vw,58px);
 margin:0;
 letter-spacing:-1px;
}
.subtitle{
 color:#777;
 font-size:18px;
 margin-top:8px;
}
.card{
 background:rgba(255,255,255,.9);
 backdrop-filter:blur(10px);
 border-radius:34px;
 padding:clamp(20px,5vw,45px);
 box-shadow:0 20px 60px rgba(80,50,30,.12);
 border:1px solid white;
}
.top{
 display:flex;
 justify-content:space-between;
 gap:10px;
 flex-wrap:wrap;
}
.badge{
 background:#fff0e8;
 padding:10px 18px;
 border-radius:30px;
 font-weight:800;
 color:#ff7654;
}
.progress{
 height:10px;
 background:#f2ebe5;
 border-radius:20px;
 overflow:hidden;
 margin:25px 0;
}
.progress div{
 width:45%;
 height:100%;
 background:linear-gradient(90deg,#ff7654,#ffb067);
}
.number{
 text-align:center;
 font-size:clamp(50px,10vw,100px);
 font-weight:900;
 margin:25px 0;
 letter-spacing:-4px;
}
.answers{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:16px;
}
.answer{
 min-height:80px;
 background:#fff9f5;
 border:2px solid #f3e5dc;
 color:#38333a;
 border-radius:22px;
 padding:15px;
 font-size:18px;
 font-weight:700;
 cursor:pointer;
 transition:.2s;
}
.answer:hover{
 transform:translateY(-3px);
 border-color:#ffb39b;
 box-shadow:0 10px 25px #ffb39b40;
}
.main-btn{
 width:100%;
 margin-top:22px;
 padding:18px;
 border:0;
 border-radius:22px;
 background:linear-gradient(135deg,#ff7654,#ffb067);
 color:white;
 font-size:20px;
 font-weight:900;
}
.subscribe{
 margin-top:30px;
 padding:24px;
 text-align:center;
 border-radius:28px;
 background:#fff4ec;
}
.subscribe-title{
 font-size:18px;
 font-weight:800;
}
.subscribe a{
 display:inline-block;
 margin-top:14px;
 padding:15px 30px;
 border-radius:999px;
 background:#ff7654;
 color:white;
 text-decoration:none;
 font-weight:900;
}
@media(max-width:700px){
 body{padding:10px}
 .answers{grid-template-columns:1fr}
 .card{border-radius:24px}
 .number{letter-spacing:-1px}
}
</style>
</head>
<body>
<div class="wrapper">
<div class="header">
<h1>Числовой диктор</h1>
<div class="subtitle">Учимся правильно читать и называть числа</div>
</div>

<div class="card">
<div class="top">

<div class="badge">Раунд 5/12</div>
</div>

<div class="progress"><div></div></div>

<div class="number">2 405</div>

<div class="answers">
<button class="answer">две тысячи четыреста пять</button>
<button class="answer">два тысяча четыреста пять</button>
<button class="answer">две тысячи четыреста пятьдесят</button>
<button class="answer">двести сорок пять</button>
</div>

<button class="main-btn">Следующее число →</button>

<div class="subscribe">
<div class="subscribe-title">🎓 Больше интерактивных заданий по математике</div>
<a href="https://t.me/lera_easy_math" target="_blank">Подписаться на канал автора</a>
</div>
</div>
</div>
</body>
</html>
